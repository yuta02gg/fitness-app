      less_than_or_equal_to: "は%{count}以下の値にしてください"

  helpers:
    submit:
      create: 登録する
      update: 更新する
      submit: 保存する

  devise:
    failure:
      invalid: "%{authentication_keys}またはパスワードが違います"
      unauthenticated: "ログインしてください"
      not_found_in_database: "%{authentication_keys}またはパスワードが違います"
